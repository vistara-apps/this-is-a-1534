name: Deploy to Vercel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install

    - name: Build application
      run: npm run build
      env:
        NODE_OPTIONS: --max-old-space-size=4096
        
    - name: Check Vercel secrets
      id: check-secrets
      run: |
        if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
          echo "vercel-configured=false" >> $GITHUB_OUTPUT
          echo "⚠️ Vercel secrets not configured. Skipping deployment."
        else
          echo "vercel-configured=true" >> $GITHUB_OUTPUT
          echo "✅ Vercel secrets configured. Proceeding with deployment."
        fi
        
    - name: Deploy to Vercel (Production)
      if: steps.check-secrets.outputs.vercel-configured == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-args: '--prod'
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        
    - name: Deploy to Vercel (Preview)
      if: steps.check-secrets.outputs.vercel-configured == 'true' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-args: '--no-wait'
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        
    - name: Comment PR with deployment status
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      continue-on-error: true
      with:
        script: |
          try {
            const vercelConfigured = '${{ steps.check-secrets.outputs.vercel-configured }}' === 'true';
            
            if (vercelConfigured) {
              // Try to get deployment info
              try {
                const { data: deployments } = await github.rest.repos.listDeployments({
                  owner: context.repo.owner,
                  repo: context.repo.repo
                });
                const latestDeployment = deployments[0];
                if (latestDeployment) {
                  const deploymentUrl = `https://${latestDeployment.environment}.vercel.app`;
                  await github.rest.issues.createComment({
                    issue_number: context.issue.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: `🚀 **Preview Deployment Ready!**
                    \n\n📱 **URL:** ${deploymentUrl}
                    \n\nThis preview will be automatically updated when you push new commits to this PR.`
                  });
                } else {
                  await github.rest.issues.createComment({
                    issue_number: context.issue.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: `✅ **Build Successful!**
                    \n\n🏗️ The application has been built successfully. Deployment may be in progress.
                    \n\n📦 Build artifacts are ready for deployment.`
                  });
                }
              } catch (error) {
                console.log('Deployment info not available, posting build success message');
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `✅ **Build Successful!**
                  \n\n🏗️ The application has been built successfully. Deployment may be in progress.
                  \n\n📦 Build artifacts are ready for deployment.`
                });
              }
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `✅ **Build Successful!**
                \n\n🏗️ The application has been built successfully.
                \n\n⚠️ **Note:** Vercel deployment is not configured. To enable automatic deployments, please configure the following repository secrets:
                \n- \`VERCEL_TOKEN\`
                \n- \`VERCEL_ORG_ID\`
                \n- \`VERCEL_PROJECT_ID\`
                \n\n📦 Build artifacts are available for manual deployment.`
              });
            }
          } catch (error) {
            console.log('Failed to post PR comment:', error.message);
          }
